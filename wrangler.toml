name = "shawnybot"
main = "./src/server.js"
compatibility_flags = [ "nodejs_compat" ]
compatibility_date="2025-02-22"

[[kv_namespaces]]
binding = "ALLOWED_USERS"
id = "d620fc69264c4085bdf528b80014e6cc"

# Set via: wrangler secret put <NAME>
# DISCORD_TOKEN
# DISCORD_PUBLIC_KEY
# DISCORD_APPLICATION_ID
# OWNER_ID
# SCRAPER_API_KEY (optional, for ya command - bypasses 403 from twidouga.net)
# LOG_WEBHOOK_URL (optional, preferred for command logs — create webhook in log channel)
# LOG_CHANNEL_ID (optional, defaults to 1514661938766811409)
# CLIENT_LOG_AUTH_KEY (X-Shawny-Key for POST /interaction-headers)

